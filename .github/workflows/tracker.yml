name: Iteration Completion Tracker

on:
  schedule:
    # Every Friday at 9:00 AM IST (03:30 UTC) — week-parity check runs inside the job
    - cron: "30 3 * * 5"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - name: Check alternate Friday
        id: parity
        run: |
          # Manual triggers always run; scheduled runs check ISO week parity
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            WEEK=$(date +%V)
            if [ $((10#$WEEK % 2)) -eq 0 ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "Odd week ($WEEK) — skipping this Friday."
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.parity.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.parity.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.parity.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run tracker
        if: steps.parity.outputs.run == 'true'
        env:
          GITHUB_TOKEN:            ${{ secrets.PROJECTS_READ_TOKEN }}
          ORG:                     glific
          PROJECT_NUMBER:          "8"
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          SPREADSHEET_ID:          ${{ secrets.SPREADSHEET_ID }}
        run: python iteration_tracker.py
