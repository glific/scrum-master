name: Glific Iteration Update

on:
  schedule:
    # Every Monday at 9:00 AM IST (03:30 UTC)
    - cron: "30 3 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (print payload, don't post to Discord)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  post-update:
    runs-on: ubuntu-latest
    steps:
      - name: Check alternate Monday (odd weeks)
        id: parity
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            WEEK=$(date +%V)
            if [ $((10#$WEEK % 2)) -eq 1 ]; then
              echo "run=true" >> $GITHUB_OUTPUT
            else
              echo "Even week ($WEEK) — skipping this Monday."
              echo "run=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.parity.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.parity.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.parity.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Run update
        if: steps.parity.outputs.run == 'true'
        env:
          GITHUB_TOKEN:      ${{ secrets.PROJECTS_READ_TOKEN }}
          ORG:               glific
          PROJECT_NUMBER:    "8"
          DISCORD_WEBHOOK:   ${{ secrets.DISCORD_WEBHOOK }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python glific_iteration_update.py --dry-run
          else
            python glific_iteration_update.py
          fi
